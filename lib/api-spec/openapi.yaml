        totalListings: { type: integer }
        totalLeads: { type: integer }
        totalUsers: { type: integer }
        totalArticles: { type: integer }
        newLeadsToday: { type: integer }
        activeListings: { type: integer }
      required:
        - totalListings
        - totalLeads
        - totalUsers
        - totalArticles
        - newLeadsToday
        - activeListings

    UserRecord:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        createdAt: { type: string }
        lastActiveAt: { type: ["string", "null"] }
      required:
        - id
        - name
        - email
        - role
        - createdAt

    TenantMatchRequest:
      type: object
