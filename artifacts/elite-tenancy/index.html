    <!-- Canonical: set to actual page URL before React mounts so Googlebot reads the correct value.
         useSeo() also updates it after React renders (belt + suspenders). -->
    <link rel="canonical" href="https://www.elitetenancy.co.uk/" />
    <script>
      (function(){
        var l = document.querySelector('link[rel="canonical"]');
        if (l) {
          var p = location.pathname.replace(/\/$/, '') || '/';
          l.href = 'https://www.elitetenancy.co.uk' + (p === '/' ? '/' : p);
        }
      })();
    </script>
