<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary meta -->

    <meta name="description" content="Elite Tenancy connects high-quality tenants with premium UK rental properties. AI-powered tenant matching, transparent pricing, and dedicated support for landlords and renters." />

    <!-- Canonical (homepage default; overridden per-route by prerender script and per-page by useSeo()) -->

    <link rel="alternate" hreflang="x-default" href="https://www.elitetenancy.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Elite Tenancy" />
    <meta property="og:title"       content="Elite Tenancy — Premium UK Lettings Platform" />
    <meta property="og:description" content="Find your perfect premium rental property in the UK. AI-powered matching, verified landlords, and a seamless letting experience." />
    <meta property="og:url"         content="https://www.elitetenancy.co.uk/" />
    <meta property="og:image"       content="https://www.elitetenancy.co.uk/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Elite Tenancy — Premium UK Lettings Platform" />
    <meta property="og:locale"      content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@EliteTenancy" />
    <meta name="twitter:creator"     content="@EliteTenancy" />
    <meta name="twitter:title"       content="Elite Tenancy — Premium UK Lettings Platform" />
    <meta name="twitter:description" content="Find your perfect premium rental property in the UK. AI-powered matching, verified landlords, and a seamless letting experience." />
    <meta name="twitter:image"       content="https://www.elitetenancy.co.uk/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Elite Tenancy — Premium UK Lettings Platform" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="DENY" />
    <meta http-equiv="Referrer-Policy"        content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy"     content="camera=(), microphone=(), geolocation=()" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

    <!-- Plausible Analytics (GDPR-safe, no cookie banner needed) -->
    <script defer data-domain="elitetenancy.co.uk" src="https://plausible.io/js/script.js"></script>

    <!-- Structured Data — RealEstateAgent -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Elite Tenancy",
      "legalName": "Elite Tenancy Ltd",
      "url": "https://www.elitetenancy.co.uk",
      "logo": "https://www.elitetenancy.co.uk/logo.svg",
      "image": "https://www.elitetenancy.co.uk/og-image.jpg",
      "description": "Premium UK lettings platform connecting quality tenants with exceptional rental properties. Zero upfront fees, AI-powered matching, completion-only model.",
      "email": "info@elitetenancy.co.uk",
      "telephone": "+44-7446-192577",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Office 18077, 182-184 High Street North",
        "addressLocality": "East Ham",
        "addressRegion": "London",
        "postalCode": "E6 2JA",
        "addressCountry": "GB"
      },
      "identifier": {
        "@type": "PropertyValue",
        "name": "Companies House Number",
        "value": "17135665"
      },
      "areaServed": { "@type": "Country", "name": "United Kingdom" },
      "priceRange": "££",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://twitter.com/EliteTenancy",
        "https://www.linkedin.com/company/elite-tenancy",
        "https://find-and-update.company-information.service.gov.uk/company/17135665"
      ]
    }
    </script>

    <!-- Structured Data — WebSite + Sitelinks SearchBox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Elite Tenancy",
      "url": "https://www.elitetenancy.co.uk",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.elitetenancy.co.uk/listings?city={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — BreadcrumbList (homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.elitetenancy.co.uk/"
        }
      ]
    }
    </script>
