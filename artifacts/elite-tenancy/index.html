<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>Elite Tenancy — Premium UK Lettings Platform</title>
    <meta name="description" content="Elite Tenancy connects high-quality tenants with premium UK rental properties. AI-powered tenant matching, transparent pricing, and dedicated support for landlords and renters." />
    <meta name="keywords" content="premium lettings, luxury rentals UK, find a room London, property to rent, landlord platform, tenant matching, UK lettings agent" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Elite Tenancy Ltd" />
    <link rel="canonical" href="https://www.elitetenancy.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Elite Tenancy" />
    <meta property="og:title" content="Elite Tenancy — Premium UK Lettings Platform" />
    <meta property="og:description" content="Find your perfect premium rental property in the UK. AI-powered matching, verified landlords, and a seamless letting experience." />
    <meta property="og:url" content="https://www.elitetenancy.co.uk/" />
    <meta property="og:image" content="https://www.elitetenancy.co.uk/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EliteTenancy" />
    <meta name="twitter:title" content="Elite Tenancy — Premium UK Lettings Platform" />
    <meta name="twitter:description" content="Find your perfect premium rental property in the UK. AI-powered matching, verified landlords, and a seamless letting experience." />
    <meta name="twitter:image" content="https://www.elitetenancy.co.uk/opengraph.jpg" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

    <!-- Plausible Analytics (GDPR-safe, no cookie banner needed) -->
    <script defer data-domain="elitetenancy.co.uk" src="https://plausible.io/js/script.js"></script>

    <!-- Structured Data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Elite Tenancy",
      "url": "https://www.elitetenancy.co.uk",
      "logo": "https://www.elitetenancy.co.uk/logo.svg",
      "description": "Premium UK lettings platform connecting quality tenants with exceptional rental properties.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "GB"
      },
      "sameAs": [
        "https://twitter.com/EliteTenancy",
        "https://www.linkedin.com/company/elite-tenancy"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
