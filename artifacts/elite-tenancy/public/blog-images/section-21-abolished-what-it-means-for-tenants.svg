<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#163A4A" />
      <stop offset="1" stop-color="#1F4E63" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D4A24A" stop-opacity="0.35" />
      <stop offset="1" stop-color="#D4A24A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="goldBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D89A" />
      <stop offset="1" stop-color="#B8862A" />
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#FFFFFF" fill-opacity="0.08" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect width="1200" height="630" fill="url(#dots)" />
  <circle cx="180" cy="90" r="340" fill="url(#glow)" />
  <circle cx="100" cy="540" r="150" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5" />
  <circle cx="100" cy="540" r="110" fill="none" stroke="#D4A24A" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- Elite Tenancy diamond watermark, bottom-right -->
  <g transform="translate(1080, 40) scale(0.42)" opacity="0.35">
    <path d="M60 4 L108 24 L108 88 L60 146 L12 88 L12 24 Z" stroke="#D4A24A" stroke-width="4" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Category pill -->
  <g transform="translate(64, 56)">
    <rect width="171.5" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.15" />
    <circle cx="24" cy="20" r="4" fill="#D4A24A" />
    <text x="40" y="26" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#D4A24A">TENANT ADVICE</text>
  </g>

  <!-- Icon box -->
  <g transform="translate(504, 195)">
    <rect width="192" height="192" rx="40" fill="#FAF8F4" />
    <g transform="translate(56, 56)" stroke="#163A4A" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g transform="scale(3.3)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" /><path d="m9 12 2 2 4-4" /></g>
