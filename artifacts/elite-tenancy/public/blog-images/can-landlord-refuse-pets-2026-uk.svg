  <circle cx="1020" cy="90" r="340" fill="url(#glow)" />
  <circle cx="1100" cy="540" r="150" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5" />
  <circle cx="1100" cy="540" r="110" fill="none" stroke="#D4A24A" stroke-opacity="0.15" stroke-width="1.5" />

