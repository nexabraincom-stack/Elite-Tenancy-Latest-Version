kind = "web"
previewPath = "/"
title = "Elite Tenancy"
version = "1.0.0"
id = "artifacts/elite-tenancy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21059

[services.development]
run = "pnpm --filter @workspace/elite-tenancy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elite-tenancy", "run", "build" ]
publicDir = "artifacts/elite-tenancy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21059"
BASE_PATH = "/"
